<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4C1D95"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <radialGradient id="inner" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Fondo violeta redondeado -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#inner)"/>
  <!-- Letra S blanca bold -->
  <text x="50" y="67" text-anchor="middle" font-size="62" font-weight="900"
    font-family="system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif"
    fill="white" letter-spacing="-1">S</text>
  <!-- Flecha esmeralda con glow -->
  <g filter="url(#glow)">
    <line x1="60" y1="37" x2="75" y2="21" stroke="#10B981" stroke-width="5.5" stroke-linecap="round"/>
    <polyline points="62,20 75,21 74,34" stroke="#10B981" stroke-width="5.5"
      stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
